<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!-- PiDrive MPRIS2 D-Bus Policy
     Erlaubt root, org.mpris.MediaPlayer2.pidrive auf dem SystemBus zu ownen.
     Installationspfad: /etc/dbus-1/system.d/pidrive-mpris2.conf
     Alternativ: MPRIS2 deaktivieren wenn kein BMW-AVRCP benötigt. -->
<busconfig>
  <policy user="root">
    <allow own="org.mpris.MediaPlayer2.pidrive"/>
    <allow send_destination="org.mpris.MediaPlayer2.pidrive"/>
    <allow receive_sender="org.mpris.MediaPlayer2.pidrive"/>
  </policy>
  <policy context="default">
    <allow send_destination="org.mpris.MediaPlayer2.pidrive"/>
    <allow receive_sender="org.mpris.MediaPlayer2.pidrive"/>
  </policy>
</busconfig>
