{% extends "base.html" %}
{% block title %}PiDrive — Audio{% endblock %}
{% block content %}
<div class="card">
  <div class="card-title">🔊 Audio-Routing</div>
  <div id="audioRoute" style="font-size:13px;margin-bottom:10px">Lade…</div>
  <div class="btn-row">
    <button class="btn primary" onclick="sendCmd('audio_klinke')">Klinke</button>
    <button class="btn" onclick="sendCmd('audio_bt')">Bluetooth</button>
    <button class="btn" onclick="sendCmd('audio_hdmi')">HDMI</button>
    <button class="btn" onclick="sendCmd('audio_all')">Auto</button>
  </div>
</div>
<div class="card">
  <div class="card-title">🔉 Lautstärke</div>
  <div id="volBlock" style="font-size:20px;font-weight:bold;text-align:center;padding:10px">–</div>
  <div class="btn-row" style="justify-content:center">
    <button class="btn" style="font-size:18px;width:50px" onclick="sendCmd('vol_down')">－</button>
    <button class="btn" style="font-size:18px;width:50px" onclick="sendCmd('vol_up')">＋</button>
  </div>
</div>
<div class="card">
  <div class="card-title">🔧 Audio Debug Cockpit</div>
  <div id="audioDebugBlock" style="font-size:13px">Lade…</div>
  <button class="btn" onclick="loadAudioDebug()" style="margin-top:8px">Aktualisieren</button>
</div>
{% endblock %}
{% block extra_js %}<script>
function onBaseRefresh(j, st) {
  const e=(id)=>document.getElementById(id);
  if(e('volBlock')) e('volBlock').textContent=(st.volume??'–')+'%';
  if(e('audioRoute')) e('audioRoute').innerHTML=`
    <b>Effektiv:</b> ${st.audio_effective||'–'} | <b>Angefordert:</b> ${st.audio_out||'–'}`;
}
async function loadAudioDebug() {
  try{const r=await fetch('/api/audio');const j=await r.json();
    document.getElementById('audioDebugBlock').innerHTML=`<pre style="font-size:11px">${JSON.stringify(j,null,2)}</pre>`;}catch(e){}
}
loadAudioDebug();
</script>{% endblock %}
